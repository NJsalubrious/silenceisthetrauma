# The Buffer

## Part One: Stock and Soil

[ground] My parents ran four hundred acres of cattle country outside Armidale. Hard frost in winter. Forty degrees by Christmas. The kind of land that cracked open in the dry and tried to swallow your boots in the wet.
[pause]
[read] You learned to read livestock before you could read a sentence. Which beast was going to kick. Which one was sick and hiding it. You learned it from the way they carried themselves, the set of the shoulders, the angle of the skull, the difference between an animal resting and an animal deciding.
[pause]
[shift] Farm hands came through. Shearers. Drifters looking for cash work. My father hired anyone willing to dig post holes. Some were good men down on their luck. Some had court dates in towns they'd already left.
[pause]
[ground] You didn't need a resume. You watched a man walk from his car to the gate. You watched how he held the wire when he ducked through the fence. You watched whether he looked at the dogs or the dogs looked away from him.
[pause]
[read] By fourteen I could pick the ones who'd steal from the fuel drum. Not because they looked like thieves. Because something in the way they stood told you they'd already done the maths on it.
[pause-medium]
[shift] I took a psychology degree because my mother pushed it. She was right to. But the degree didn't teach me what the paddock already had. It gave me language for things I'd been watching since I was a kid standing on the rail yard fence while strangers rolled through the gate.
[pause]
[read] I spent fifteen years in juvenile detention facilities after that. Concrete and fluorescent strip lighting and boys who'd done things that would turn your guts. My colleagues liked their diagnostic categories. They'd sit in case conferences arguing about personality clusters and conduct profiles and attachment disorders. They had books for everything.
[pause]
[ground] I didn't need the books. I just sat in the room with whoever they put in front of me. If the kid wanted to talk, I'd listen. If he didn't, I'd stay anyway. Most of them were just bent from the pressure of where they'd grown up. You sit with them long enough and the spine straightens a bit. Not all the way. But enough.
[pause]
[shift] Some of them, though. Some of them sat across from you and something was just absent. Not damaged. Not hurting. Just not installed.
[pause]
[ground] You don't call it anything. You don't write it in a report. You just note it in your body, a tightening across the back of the neck, and you stay alert.
[pause-large]

## Part Two: Elizabeth

[ground] I met her after the worst of it.
[pause]
[read] She'd had a son, Dominic. The biological father was someone she'd met young and followed overseas. I never met the man. What I knew came from Elizabeth and you had to read between what she said. He had stories. Family money, apparently. Places he'd been. A way of talking that made you feel like he knew something you didn't. She never said much more than that and I never pushed.
[pause]
[shift] But I knew Elizabeth. For all that logic, for all that speed, she had an idealist buried in there somewhere. Not the performative kind. More like a blind spot shaped like possibility. She saw a man with a story and a direction and she followed it. Nepal. London. Wherever he pointed. She thought the horizon was the destination. Turned out the man was just moving because he didn't know how to stop. He left her pregnant. No note. No explanation. Just gone.
[pause]
[ground] She came back pregnant. Raised the boy alone. Then the state took custody when she couldn't hold the edges together anymore.
[pause]
[read] That's when I found her. Or she found me. I had money from the sale of my parents' land, split with my two sisters. Janet in Perth, Carol in Tasmania. We stayed close even across the distance. The farm was gone but the proceeds were solid and I wasn't a man who spent much.
[pause]
[shift] Elizabeth wasn't broken. She was stalled. All that speed, all that processing power, and nowhere to point it. She'd start a sentence and abandon it halfway because her brain had already moved three steps past the thought. She'd forget her tea on the rail. She'd look at you like you were slow for not keeping up. Other people found her too much. Too fast. Too many directions at once.
[pause]
[ground] I didn't try to slow her down. I didn't see a fault. We evolved in groups. You need people who move that fast. You just need someone standing still beside them so they have something to push off from.
[pause]
[read] I was the still point. My money bought the time. She went back to university. Did the chemistry. Then the physics because she was bored waiting for the chemistry results. Then the patents started coming and the money followed. All of it in Sydney. She was building something and I was the floor she built it on.
[pause]
[shift] She never stopped trying to get Dominic back. Letters. Court applications. Phone calls that went nowhere. The system moved at its own speed and Elizabeth moved at hers and neither met in the middle.
[pause]
[ground] I loved her because she burned. Not romantic burning. Operational burning. She ran at the world like it owed her a fight and she intended to collect.
[pause-medium]

## Part Three: The Porch

[pause-snap]
[heavy] He arrived on a Tuesday. Three in the afternoon.
[pause]
[ground] Fifteen years old. Standing on the front porch of our place in Sydney. School shirt tucked in. Bag over one shoulder. He didn't knock. He just stood there until Elizabeth opened the door.
[pause]
[read] She made a sound I'd never heard from her. A gasp that pulled fifteen years of held breath out of her chest in a single second. She grabbed him. She pulled him into the hallway. She was shaking.
[pause]
[shift] I was at the kitchen sink. I dried my hands on my shirt and walked to the hall.
[pause]
[ground] I saw his face over her shoulder.
[pause]
[void] He was looking past her. His eyes tracked the hallway. Measured the ceiling height. Noted the deadbolt on the front door. Registered me standing six metres back by the kitchen bench. All of it in under two seconds.
[pause]
[read] Then his arms came up and wrapped around her and he buried his face in her neck and his shoulders started to shake.
[pause]
[shift] Perfect timing. Perfect pressure. The embrace of a boy reuniting with the mother he'd lost.
[pause]
[heavy] My neck locked.
[pause]
[ground] I had seen that sequence before. In D-block. In the family visit rooms. The young ones who'd worked out that if you match your breathing rate to the person holding you, they can't tell the difference between grief and performance. The body reads it as real. The lungs sync. The heart follows.
[pause]
[read] I stood at the kitchen bench and I watched this fifteen-year-old boy calibrate himself against his mother's nervous system in real time.
[pause]
[shift] And I said nothing. Because you don't step between a mother and her child with a theory. You stand by the door. You watch the room.
[pause-large]

## Part Four: The Instrument

[read] The foster family had dissolved. Not dramatically. They just stopped functioning around him. He'd lied with such consistent, unbroken conviction that they'd lost their grip on what was actually happening inside their own house. He could sit across from a woman and describe an afternoon that never occurred, and his pulse wouldn't shift. His voice wouldn't climb. His pupils wouldn't dilate.
[pause]
[shift] They didn't hit him. They didn't starve him. They just surrendered. They rang the department and said they couldn't do it anymore and nobody asked them what "it" was.
[pause]
[ground] His school record was immaculate. Mock-trial captain. Class prefect. His legal studies teacher called him the best debater she'd seen in twenty years. His grades sat in the top five percent.
[pause]
[void] On paper, he was everything.
[pause]
[read] Elizabeth regained custody. She had her patent money coming in. She had the PhD. She had the lab and the land up north and a life that looked, from the outside, like stability.
[pause]
[ground] Dominic moved in. He was polite. He asked about my day. He dried the dishes without being asked. He sat with Elizabeth in her lab and listened to her talk about reagent concentrations and nodded in all the right places.
[pause]
[shift] I watched him the way I used to watch the drifters walk from their cars to the gate.
[pause]
[heavy] He never once looked at the dogs.
[pause]
[ground] The dogs looked at him. Both of them. They'd track him from the moment he came into the yard. Not barking. Not growling. Just locked on, their heads low, their bodies pressed against the far fence.
[pause]
[read] I grew up with working dogs. Kelpies, heelers. A dog doesn't decide to fear something. The decision happens below thought. Somewhere in the animal brain where the old calculations still run, the ones that kept things alive before language arrived and cluttered everything up.
[pause]
[shift] The dogs knew.
[pause-medium]

## Part Five: The Accumulation

[ground] Two years. That's how long it took for the surface to crack.
[pause]
[read] He started disappearing. Three days at a stretch. No phone call. No explanation. He'd come back wearing new boots, new watch, carrying himself like a man twice his age who'd just closed a deal.
[pause]
[shift] Elizabeth asked where he'd been. He told her a friend's place. Studying. He said it looking directly at her, his voice soft, his hand on her arm. She believed him because his delivery was surgical.
[pause]
[ground] I didn't ask. I just tracked the patterns. The disappearances increased in length. The possessions increased in value. He was seventeen and he was carrying cash in rolls held with rubber bands.
[pause]
[read] Then a boy at his school died. A fall from a construction site after hours. The coroner called it misadventure. The police report said the boy had been drinking. There were three other students present and none of them would say a word about the circumstances.
[pause]
[shift] At the memorial service, Dominic stood at the front row. He placed a hand on the dead boy's mother's shoulder. I watched his chest from across the room.
[pause]
[void] He was matching her respiratory rate. Breath for breath. His jaw held the exact angle of suppressed grief, a micro-tremor in the lower lip, a blink rate just above baseline. The mechanical reproduction of a human being in pain.
[pause]
[ground] Not one trace of moisture in his eyes.
[pause]
[heavy] A month later, a girl arrived at the house. Sixteen. Throwing up in the garden bed.
[pause]
[read] She was pregnant. She was screaming. She was looking for Dominic.
[pause]
[shift] Dominic packed a single bag. He walked out the front door while the girl was still sobbing into Elizabeth's chest. He didn't look back. He didn't say goodbye.
[pause]
[ground] Elizabeth held the girl. She held the situation. She held it the way she held everything, with both hands and her teeth.
[pause]
[read] I stood on the porch and watched his car pull out of the drive. The brake lights didn't flicker. The indicator clicked once, precise as a metronome.
[pause]
[shift] He was done with this address.
[pause-large]

## Part Six: The Contract

[pause-snap]
[ground] Six months later. The baby was born. The girl had gone back to her family. Elizabeth had custody of the infant. She hadn't slept in weeks. Her patent royalties were substantial but she was spending faster than they arrived, lawyers, medical bills, formula.
[pause]
[read] I came home from the hardware store and he was sitting at the kitchen island.
[pause]
[heavy] Tailored suit. Cufflinks. A leather document wallet open on the bench.
[pause]
[shift] He looked like he was twenty-five. He was eighteen.
[pause]
[void] "I've structured a trust for the child," he said. The voice was new. Deeper. Polished like a river stone. "It's straightforward. I just need Elizabeth's signature as guarantor. Given the patent valuations, it's a formality."
[pause]
[ground] Elizabeth was behind him. She was holding the baby against her shoulder, swaying the way exhausted women sway, not for comfort but to keep from falling. She had a pen in her hand.
[pause]
[read] She reached for the document.
[pause]
[heavy] I put the hardware bags on the floor. I walked to the island. I placed my hand flat on the paper.
[pause]
[ground] "No."
[pause]
[void] He smiled. "It's standard, Johna. I've had it reviewed. It protects the child's future."
[pause]
[read] I wasn't reading the document. I didn't know trust law. I didn't know what cross-collateralisation meant. I didn't care.
[pause]
[shift] I was reading him.
[pause]
[ground] His index finger rested on the edge of the wallet. No pressure. Just placed. The smile sat on his face like something he'd rehearsed in a bathroom mirror, the cheekbones engaged, the eyes steady, the corners of the mouth pulled to a precise and practised width.
[pause]
[read] I knew that smile. I'd sat across from it in interview rooms for fifteen years. It's the smile a person builds when they've studied what a smile is supposed to do but don't have the internal signal that generates one.
[pause]
[heavy] "I don't need to read it," I said.
[pause]
[shift] The kitchen went still.
[pause]
[ground] For a fraction of a second, less than a heartbeat, the suit dissolved. The posture dissolved. The rehearsal dissolved.
[pause]
[void] What looked back at me was something I have never been able to describe to another person. Not fury. Not hatred. Those are human temperatures. This was the moment a locked gate registers in the body of something that has been moving through open doors its entire life.
[pause]
[read] Cold calculation. Rapid. Total. I watched him re-evaluate me, not as a stepfather, not as family, as an obstacle. I watched the assessment take less than a second. I watched him decide, right there in the kitchen, whether I was a problem he could talk past or a structure he'd have to go around.
[pause]
[heavy] "It's for the family," he said. The pitch dropped. The warmth fell out of his voice like something had been switched off at the mains.
[pause]
[ground] "The family is fine," I said. I slid the wallet back across the bench. "You can go."
[pause]
[shift] He held my eyes for three seconds. I counted them against my own heartbeat. Each one a test. Each one a measurement.
[pause]
[read] Then he buttoned his jacket. He picked up the wallet. He walked to the front door and opened it and stepped through it and pulled it shut behind him with a soft, considered click.
[pause]
[ground] He didn't slam it. He didn't raise his voice. He didn't threaten.
[pause]
[heavy] That was what made my hands shake.
[pause-large]

## Part Seven: The Architecture

[ground] Elizabeth stood in the kitchen holding the baby. She was looking at the door.
[pause]
[read] I watched it happen. The thing I'd been dreading for two years. The moment her brain caught up with what her body had been refusing to process.
[pause]
[shift] She looked at the pen in her hand. She looked at the bench where the document had been. She looked at the door. And something behind her eyes recalibrated.
[pause]
[ground] She sat down. She didn't speak for a long time.
[pause]
[void] "How long have you known?" she said.
[pause]
[read] "Since the porch."
[pause]
[shift] She pressed her face into the baby's skull and breathed.
[pause-large]

## Part Eight: The Skyline

[ground] He didn't come back to the house.
[pause]
[read] He didn't need to. Over the next eighteen months, his name started appearing in places I wasn't looking for it. A development application in the Herald. A tender for a council project in the west. An article about a young property investor who was reshaping the skyline.
[pause]
[shift] He was twenty. He had a company. He had offices. He had a photograph in a business magazine where he stood on a building site with his hands in his pockets and that same practised smile and the caption called him "Sydney's youngest self-made developer."
[pause]
[ground] Self-made. I put the magazine down and stared at the wall for a long time.
[pause]
[read] People started going quiet around his name. A bloke I knew from the old days, a probation officer named Gareth, rang me one night. He'd been asking around about a contract dispute involving one of Dominic's companies. Two days later he rang again to say he wasn't asking anymore. He didn't say why. He didn't need to.
[pause]
[void] That's how it works. Not threats. Not violence. Just a shift in the air pressure around a name. People stop looking. People stop asking. The ones who don't stop find that their questions have consequences they can't trace back to a source.
[pause]
[shift] I started hearing things through contacts I hadn't spoken to in years. Men who worked security. Men who'd done time. They mentioned his name the way you mention weather. A fact of the landscape. Unavoidable.
[pause]
[ground] He wasn't just building properties. He was building something underneath them. Something that used the properties as a surface and operated below it in a way that made the surface look legitimate. By twenty-two he had more money than the patents had ever generated. By twenty-five his name was on plaques in hospital lobbies and donor rolls at universities.
[pause]
[read] The boy who pinned a cicada and watched it spin was now spinning entire postcodes.
[pause]
[heavy] And then the letter arrived.
[pause-large]

## Part Nine: The Claim

[ground] A family law solicitor. Headed paper. Addressed to Elizabeth.
[pause]
[read] Dominic was seeking contact with the child. His child. Ethel. The letter used phrases like "the father's right to meaningful relationship" and "the best interests of the minor." It referenced his income, his stability, his standing in the community.
[pause]
[shift] Elizabeth read it standing at the kitchen bench. She read it twice. Then she put it down and picked up Ethel and held her against her chest and didn't speak for twenty minutes.
[pause]
[ground] We fought it. Elizabeth retained a solicitor. We filed responses. We produced documentation. The court process moved slowly and Dominic's lawyers moved fast. Every filing was precise. Every affidavit read like it had been edited by someone who understood how courts think.
[pause]
[void] On paper, he was a successful young businessman seeking a relationship with his daughter. On paper, there was no reason to refuse.
[pause]
[read] The court granted supervised visits. We challenged. He appealed. His barrister was one of the most expensive in Sydney and the man spoke as if Dominic's desire to see his child was the most natural thing on earth.
[pause]
[shift] It went on for months. Elizabeth spent every dollar the patents made on legal fees. I spent what was left of the farm. We were not going bankrupt. We were watching a machine disassemble our defences one filing at a time.
[pause]
[ground] Then the letters changed tone. A different solicitor. A different firm. The language shifted from "contact" to "custody." From "relationship" to "primary care."
[pause]
[heavy] He wanted Ethel.
[pause]
[void] Not because he loved her. Not because he needed her. Because she was something we had that he didn't and that fact registered in his operating system as an imbalance that required correction.
[pause]
[read] Then the court process stalled. Our solicitor rang on a Friday and said she'd been approached by someone at a function. A man she didn't know. He mentioned the case by name. He mentioned Ethel by name. He mentioned our home address. He said it was a shame about the parking situation on our street.
[pause]
[shift] She said it very calmly. She said she was withdrawing from the case. She said she recommended we find someone outside Sydney.
[pause]
[ground] That's when it stopped being legal.
[pause]
[heavy] I sat on the verandah that night and looked at the street and I knew exactly what was happening. I'd seen it in the system for fifteen years. The boy who calibrated his breathing against his mother's nervous system was now calibrating entire institutions. Courts. Solicitors. Addresses. He was mapping us the way he mapped a development site. Working out which structures could be purchased and which ones had to be removed.
[pause]
[read] We were structures.
[pause-large]

## Part Ten: The Number

[heavy] Elizabeth made the call the next morning.
[pause]
[ground] She sat at the kitchen table with a piece of paper she'd been carrying in her wallet for weeks. She dialled a number and spoke for eleven minutes. I sat across from her and watched Ethel crawl across the kitchen floor toward the cat.
[pause]

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const rawText = document.getElementById('raw-story').textContent;
            const container = document.getElementById('story-container');
            const lines = rawText.split('\n').filter(line => line.trim() !== '');

            let htmlContent = '';

            const themeMap = {
                "Part One: Stock and Soil": "theme-dust",
                "Part Two: Elizabeth": "theme-dust",
                "Part Three: The Porch": "theme-arrival",
                "Part Four: The Instrument": "theme-arrival",
                "Part Five: The Accumulation": "theme-snare",
                "Part Six: The Contract": "theme-contract",
                "Part Seven: The Architecture": "theme-contract",
                "Part Eight: The Skyline": "theme-skyline",
                "Part Nine: The Claim": "theme-skyline",
                "Part Ten: The Number": "theme-number",
                "Part Eleven: The Dirt": "theme-buffer"
            };

            lines.forEach((line) => {
                if (line.startsWith('## ')) {
                    const partTitle = line.replace('## ', '');
                    htmlContent += `<div class="part-header beat" data-trigger-theme="${partTitle}">${partTitle}</div>`;
                    return;
                }

                if (line.startsWith('# ')) return;

                if (line.includes('[pause-stark]')) { htmlContent += `<div class="pause-stark"></div>`; return; }
                if (line.includes('[pause-snap]')) { htmlContent += `<div class="pause-snap"></div>`; return; }
                if (line.includes('[pause-void]')) { htmlContent += `<div class="pause-void"></div>`; return; }
                if (line.includes('[pause-large]')) { htmlContent += `<div class="pause-large"></div>`; return; }
                if (line.includes('[pause-medium]')) { htmlContent += `<div class="pause-medium"></div>`; return; }
                if (line.includes('[pause]')) { htmlContent += `<div class="pause-small"></div>`; return; }

                const match = line.match(/^\[(.*?)\] (.*)$/);
                if (match) {
                    const tag = match[1];
                    const text = match[2];

                    let cssClass = "voice-ground";
                    if (tag === "read") cssClass = "voice-read";
                    if (tag === "void") cssClass = "voice-void";
                    if (tag === "shift") cssClass = "voice-shift";
                    if (tag === "heavy") cssClass = "voice-heavy";
                    if (tag === "final") cssClass = "final-realization";

                    htmlContent += `<p class="beat ${cssClass}">${text}</p>`;
                }
            });

            container.innerHTML = htmlContent;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, {
                root: null,
                rootMargin: '0px 0px -12% 0px',
                threshold: 0.1
            });

            document.querySelectorAll('.beat').forEach(beat => {
                observer.observe(beat);
            });

            const themeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const partTitle = entry.target.getAttribute('data-trigger-theme');
                        if (partTitle && themeMap[partTitle]) {
                            const newTheme = themeMap[partTitle];
                            document.body.classList.remove('theme-dust', 'theme-arrival', 'theme-snare', 'theme-contract', 'theme-buffer');
                            document.body.classList.add(newTheme);
                        }
                    }
                });
            }, {
                root: null,
                rootMargin: '-50% 0px -50% 0px',
                threshold: 0
            });

            document.querySelectorAll('.part-header').forEach(header => {
                themeObserver.observe(header);
            });

            window.addEventListener('scroll', () => {
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                document.getElementById("progress-bar").style.width = scrolled + "%";
            });

            setTimeout(() => {
                window.dispatchEvent(new Event('scroll'));
            }, 100);
        });
    </script>
</body>
