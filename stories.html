    <script async src="https://www.googletagmanager.com/gtag/js?id=G-34H8LS884F"></script>

    <style>
        :root {
            --glitch-color-1: #00ff41;
            --glitch-color-2: #ff0055;
            --bg-dark: #050505;
            --bg-card: #0a0a0a;
            --border-dim: #1a1a1a;
            --border-hover: rgba(0, 255, 65, 0.4);
            --text-muted: #666;
            --text-dim: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-mono-custom {
            font-family: 'Courier Prime', monospace;
        }

        /* ====== GLITCH TEXT ====== */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.7;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-color-2);
            clip: rect(0, 0, 0, 0);
            animation: glitch-anim 3s infinite;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: 2px 0 var(--glitch-color-1);
            clip: rect(0, 0, 0, 0);
            animation: glitch-anim2 3s infinite 0.5s;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(0, 0, 0, 0);
            }

            2% {
                clip: rect(15px, 9999px, 18px, 0);
                transform: skew(0.2deg);
            }

            4% {
                clip: rect(0, 0, 0, 0);
            }

            94% {
                clip: rect(0, 0, 0, 0);
            }

            96% {
                clip: rect(8px, 9999px, 12px, 0);
                transform: skew(-0.15deg);
            }

            98% {
                clip: rect(0, 0, 0, 0);
            }

            100% {
                clip: rect(0, 0, 0, 0);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(0, 0, 0, 0);
            }

            2% {
                clip: rect(20px, 9999px, 24px, 0);
                transform: skew(-0.2deg);
            }

            4% {
                clip: rect(0, 0, 0, 0);
            }

            94% {
                clip: rect(0, 0, 0, 0);
            }

            96% {
                clip: rect(12px, 9999px, 16px, 0);
                transform: skew(0.15deg);
            }

            98% {
                clip: rect(0, 0, 0, 0);
            }

            100% {
                clip: rect(0, 0, 0, 0);
            }
        }

        /* ====== SCANLINES ====== */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9998;
            animation: scanline-move 8s linear infinite;
        }

        @keyframes scanline-move {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(4px);
            }
        }

        /* ====== CURSOR ====== */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background: var(--glitch-color-1);
            border-radius: 50%;
            position: fixed;
            top: -4px;
            left: -4px;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transition: transform 0.05s ease;
        }

        .cursor-glow {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.15) 0%, rgba(0, 255, 65, 0) 70%);
            border-radius: 50%;
            position: fixed;
            top: -60px;
            left: -60px;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: transform 0.2s ease;
        }

        @media (hover: none) and (pointer: coarse) {

            .cursor-dot,
            .cursor-glow {
                display: none;
            }

            html,
            body,
            * {
                cursor: default !important;
            }
        }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        /* ====== NAVBAR ====== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #1a1a1a;
        }

        .top-bar-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            color: #fff;
        }

        .brand-subtitle {
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--glitch-color-1);
            text-transform: uppercase;
        }

        /* ====== HERO ====== */
        .hero {
            padding: 140px 24px 60px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 65, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 24px;
        }

        .hero-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--glitch-color-1);
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .hero-badge-text {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--glitch-color-1);
            text-transform: uppercase;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 16px;
        }

        .hero-subtitle {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: #888;
            font-weight: 300;
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .hero-subtitle strong {
            color: #fff;
            font-weight: 500;
        }

        /* ====== STORY GRID ====== */
        .stories-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 160px;
        }

        .section-header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 20px;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .section-label {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .story-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* ====== STORY CARD ====== */
        .story-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .story-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.08);
        }

        .story-card-cover {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        .story-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: all 0.7s ease;
        }

        .story-card:hover .story-card-cover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .story-card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            transition: background 0.5s ease;
        }

        .story-card:hover .story-card-overlay {
            background: rgba(0, 0, 0, 0.1);
        }

        .story-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .story-card-read {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .story-card:hover .story-card-read {
            opacity: 1;
        }

        .read-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0, 255, 65, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 255, 65, 0.3);
            transition: transform 0.3s ease;
        }

        .story-card:hover .read-circle {
            transform: scale(1.1);
        }

        .read-circle .material-symbols-outlined {
            font-size: 28px;
            color: #000;
        }

        .story-card-info {
            padding: 16px;
            border-top: 1px solid var(--border-dim);
            background: rgba(20, 20, 20, 0.6);
            transition: border-color 0.4s ease;
        }

        .story-card:hover .story-card-info {
            border-top-color: rgba(0, 255, 65, 0.3);
        }

        .story-card-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .story-card-track {
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .story-card-cta {
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--glitch-color-1);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .story-card:hover .story-card-cta {
            color: #33ff66;
        }

        /* ====== FOOTER ====== */
        .page-footer {
            text-align: center;
            padding: 40px 24px;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .page-footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .page-footer a:hover {
            color: var(--glitch-color-1);
        }

        /* ====== ANIMATIONS ====== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ====== MOBILE ====== */
        @media (max-width: 640px) {
            .hero {
                padding: 110px 16px 40px;
            }

            .stories-container {
                padding: 0 16px 100px;
            }

            .story-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .story-card-info {
                padding: 12px;
            }

            .story-card-name {
                font-size: 12px;
            }

            .story-card-cta,
            .story-card-track {
                font-size: 9px;
            }

            .brand-title {
                font-size: 1.25rem;
            }

            .top-bar-inner {
                padding: 0 16px;
                height: 56px;
            }
        }

        @media (max-width: 380px) {
            .story-grid {
                grid-template-columns: 1fr;
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>
</head>

<body>
    <!-- Cursor Effects -->
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="scanlines"></div>

    <!-- Top Bar -->
    <nav class="top-bar">
        <div class="top-bar-inner">
            <div>
                <a href="https://pixelstortion.com" target="_blank" rel="noopener" style="text-decoration: none;">
                    <h1 class="brand-title glitch-text" data-text="PIXELSTORTION">PIXELSTORTION</h1>
                </a>
            </div>
            <div class="brand-subtitle">THE ARCHIVE</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            <span class="hero-badge-text">Classified Files</span>
        </div>
        <h2 class="hero-title">SILENCE IS<br>THE TRAUMA</h2>
        <p class="hero-subtitle"><strong>Short fiction</strong><br>Reader discretion is advised.
        </p>
    </section>

    <!-- Stories Grid -->
    <div class="stories-container">
        <div class="section-header">
            <h3 class="section-title">THE ARCHIVE</h3>
            <p class="section-label">Classified Short Fiction</p>
        </div>
        <div class="story-grid" id="story-grid"></div>
    </div>

    <!-- Footer -->
    <div class="page-footer">
        <a href="https://pixelstortion.com">← RETURN TO PIXELSTORTION</a>
    </div>

    <script>
        // ============================================================
        // CURSOR EFFECTS
        // ============================================================
        const cursorDot = document.getElementById('cursor-dot');
        const cursorGlow = document.getElementById('cursor-glow');

        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                cursorDot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            });
        }

        // ============================================================
        // STORY DATA — The growing library
        // Each entry is a "Track" in the archive.
        // Add new stories here as they are created.
        // ============================================================
        const stories = [
            {
                id: 'isla-4-7-2',
                title: 'ISLA 4-7-2',
                track: 'STORY 01 // ISLA DARK ORIGIN STORY',
                cover: 'short_stories/pixelstortion_ISLA_4-7-2.jpg',
                href: 'short_stories/pixelstortion_ISLA_4-7-2.html'
            },
            {
                id: 'islas-blast-radius',
                title: 'Isla\'s Blast Radius',
                track: 'STORY 02 // ISLA\'S BLAST RADIUS',
                cover: 'short_stories/Islas_Blast_Radius.jpg',
                href: 'short_stories/Islas_Blast_Radius.html'
            }
        ];

        // ============================================================
        // RENDER GRID
        // ============================================================
        function renderStories() {
            const container = document.getElementById('story-grid');
            if (!container) return;

            if (stories.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-muted);">
                        <span class="material-symbols-outlined" style="font-size: 48px; color: #333; display: block; margin-bottom: 16px;">menu_book</span>
                        <p>No stories available yet.</p>
                    </div>`;
                return;
            }

            container.innerHTML = stories.map((story, index) => `
                <a href="${story.href}" class="story-card"
                   style="animation: fadeInUp 0.6s ease forwards ${index * 0.12}s; opacity: 0;">
                    <div class="story-card-cover">
                        <img src="${story.cover}"
                             alt="${story.title}"
                             loading="lazy">
                        <div class="story-card-overlay"></div>
                        <div class="story-card-gradient"></div>
                        <div class="story-card-read">
                            <div class="read-circle">
                                <span class="material-symbols-outlined">menu_book</span>
                            </div>
                        </div>
                    </div>
                    <div class="story-card-info">
                        <h3 class="story-card-name" title="${story.title}">${story.title}</h3>
                        <p class="story-card-track">${story.track}</p>
                        <p class="story-card-cta">READ NOW</p>
                    </div>
                </a>
            `).join('');
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderStories();
        });
    </script>
</body>

</html>
