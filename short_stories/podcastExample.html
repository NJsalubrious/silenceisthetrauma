    <style>
        :root {
            --glitch-color-1: #00ff41;
            --glitch-color-2: #ff0055;
            --bg-dark: #050505;
            --bg-card: #0a0a0a;
            --border-dim: #1a1a1a;
            --border-hover: rgba(0, 255, 65, 0.4);

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .font-mono-custom {
            font-family: 'Courier Prime', monospace;
        }

        /* ====== GLITCH TEXT ====== */
        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.7;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--glitch-color-2);
            clip: rect(0, 0, 0, 0);
            animation: glitch-anim 3s infinite;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: 2px 0 var(--glitch-color-1);
            clip: rect(0, 0, 0, 0);
            animation: glitch-anim2 3s infinite 0.5s;
        }

        @keyframes glitch-anim {
            0% {
                clip: rect(0, 0, 0, 0);
            }

            2% {
                clip: rect(15px, 9999px, 18px, 0);
                transform: skew(0.2deg);
            }

            4% {
                clip: rect(0, 0, 0, 0);
            }

            94% {
                clip: rect(0, 0, 0, 0);
            }

            96% {
                clip: rect(8px, 9999px, 12px, 0);
                transform: skew(-0.15deg);
            }

            98% {
                clip: rect(0, 0, 0, 0);
            }

            100% {
                clip: rect(0, 0, 0, 0);
            }
        }

        @keyframes glitch-anim2 {
            0% {
                clip: rect(0, 0, 0, 0);
            }

            2% {
                clip: rect(20px, 9999px, 24px, 0);
                transform: skew(-0.2deg);
            }

            4% {
                clip: rect(0, 0, 0, 0);
            }

            94% {
                clip: rect(0, 0, 0, 0);
            }

            96% {
                clip: rect(12px, 9999px, 16px, 0);
                transform: skew(0.15deg);
            }

            98% {
                clip: rect(0, 0, 0, 0);
            }

            100% {
                clip: rect(0, 0, 0, 0);
            }
        }

        /* ====== SCANLINES ====== */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.1) 50%, rgba(0, 0, 0, 0.1));
            background-size: 100% 4px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 9998;
            animation: scanline-move 8s linear infinite;
        }

        @keyframes scanline-move {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(4px);
            }
        }

        /* ====== CURSOR ====== */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background: var(--glitch-color-1);
            border-radius: 50%;
            position: fixed;
            top: -4px;
            left: -4px;
            pointer-events: none;
            z-index: 10000;
            mix-blend-mode: screen;
            transition: transform 0.05s ease;
        }

        .cursor-glow {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.15) 0%, rgba(0, 255, 65, 0) 70%);
            border-radius: 50%;
            position: fixed;
            top: -60px;
            left: -60px;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: screen;
            transition: transform 0.2s ease;
        }

        @media (hover: none) and (pointer: coarse) {

            .cursor-dot,
            .cursor-glow {
                display: none;
            }

            html,
            body,
            * {
                cursor: default !important;
            }
        }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {

        ::-webkit-scrollbar-thumb {

            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {

        /* ====== NAVBAR ====== */

        .hero {

        }

        .hero::before {
            content: '';

        .hero-badge-text {

        .hero-title {

        .hero-subtitle {

        }

        .hero-subtitle strong {

        }

        /* ====== EPISODE GRID ====== */
        .episodes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 160px;
        }

        .section-header {
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 20px;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
        }

        .section-label {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        /* ====== EPISODE CARD ====== */
        .episode-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }

        .episode-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 255, 65, 0.08);
        }

        .episode-card-cover {
            position: relative;
            aspect-ratio: 3 / 4;
            overflow: hidden;
        }

        .episode-card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(30%);
            transition: all 0.7s ease;
        }

        .episode-card:hover .episode-card-cover img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        .episode-card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            transition: background 0.5s ease;
        }

        .episode-card:hover .episode-card-overlay {
            background: rgba(0, 0, 0, 0.1);
        }

        .episode-card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .episode-card-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .episode-card:hover .episode-card-play {
            opacity: 1;
        }

        .play-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(0, 255, 65, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 255, 65, 0.3);
            transition: transform 0.3s ease;
        }

        .episode-card:hover .play-circle {
            transform: scale(1.1);
        }

        .play-circle .material-symbols-outlined {
            font-size: 32px;
            color: #000;
            padding-left: 2px;
        }

        .episode-card-info {
            padding: 16px;
            border-top: 1px solid var(--border-dim);
            background: rgba(20, 20, 20, 0.6);
            transition: border-color 0.4s ease;
        }

        .episode-card:hover .episode-card-info {
            border-top-color: rgba(0, 255, 65, 0.3);
        }

        .episode-card-name {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode-card-cta {
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--glitch-color-1);
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .episode-card:hover .episode-card-cta {
            color: #33ff66;
        }

        .episode-card.now-playing {
            border-color: var(--glitch-color-1);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
        }

        .episode-card.now-playing .episode-card-cta {
            color: var(--glitch-color-1);
        }

        /* ====== PLAYER BAR ====== */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 9500;
            background: rgba(0, 0, 0, 0.96);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 255, 65, 0.25);
            transform: translateY(100%);
            transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .player-bar.visible {
            transform: translateY(0);
        }

        .player-bar-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #1a1a1a;
            cursor: pointer;
            position: relative;
            margin-top: 12px;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-container:hover {
            height: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--glitch-color-1), #33ff66);
            border-radius: 3px;
            width: 0%;
            position: relative;
            transition: none;
        }

        .progress-container:hover .progress-knob {
            opacity: 1;
        }

        .progress-knob {
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 255, 65, 0.5);
            opacity: 0;
            transition: opacity 0.2s;
        }

        /* Controls */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
        }

        .play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--glitch-color-1);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.2s;
        }

        .play-btn:hover {
            background: #33ff66;
            transform: scale(1.08);
        }

        .play-btn .material-symbols-outlined {
            font-size: 26px;
            color: #000;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-series {
            font-family: 'Courier Prime', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .time-display {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .time-divider {
            color: #333;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
            margin-left: 8px;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: #fff;
        }

        /* ====== EMPTY STATE ====== */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        .empty-state .material-symbols-outlined {
            font-size: 48px;
            color: #333;
            margin-bottom: 16px;
        }

        /* ====== FOOTER ====== */
        .page-footer {
            text-align: center;
            padding: 40px 24px;
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .page-footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }

        .page-footer a:hover {
            color: var(--glitch-color-1);
        }

        /* ====== ANIMATIONS ====== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        /* ====== MOBILE ====== */
        @media (max-width: 640px) {
            .hero {
                padding: 110px 16px 40px;
            }

            .episodes-container {
                padding: 0 16px 140px;
            }

            .episode-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .episode-card-info {
                padding: 12px;
            }

            .episode-card-name {
                font-size: 12px;
            }

            .episode-card-cta {
                font-size: 9px;
            }

            .controls-row {
                gap: 10px;
                padding: 10px 0;
            }

            .play-btn {
                width: 38px;
                height: 38px;
            }

            .play-btn .material-symbols-outlined {
                font-size: 22px;
            }

            .track-name {
                font-size: 13px;
            }

            .time-display {
                font-size: 10px;
            }

            .play-circle {
                width: 46px;
                height: 46px;
            }

            .play-circle .material-symbols-outlined {
                font-size: 26px;
            }

            .brand-title {
                font-size: 1.25rem;
            }

            .top-bar-inner {
                padding: 0 16px;
                height: 56px;
            }

            .progress-container {
                margin-top: 8px;
            }
        }

        @media (max-width: 380px) {
            .episode-grid {
                grid-template-columns: 1fr;
                max-width: 280px;
                margin: 0 auto;
            }
        }
    </style>

<body>
    <!-- Cursor Effects -->
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="scanlines"></div>

    <!-- Top Bar with PIXELSTORTION branding -->
    <nav class="top-bar">
        <div class="top-bar-inner">
            <div>
                <a href="https://pixelstortion.com" target="_blank" rel="noopener" style="text-decoration: none;">
                    <h1 class="brand-title glitch-text" data-text="PIXELSTORTION">PIXELSTORTION</h1>
                </a>
            </div>
            <div class="brand-subtitle">PODCAST</div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-badge">
            <div class="hero-badge-dot"></div>
            <span class="hero-badge-text">Streaming Active</span>
        </div>
        <h2 class="hero-title">SILENCE IS<br>THE TRAUMA</h2>
        <p class="hero-subtitle">An immersive original music crime series<br><strong>Three lives. One storm.</strong>
        </p>
    </section>

    <!-- Episodes -->
    <div class="episodes-container">
        <div class="section-header">
            <h3 class="section-title">EPISODES</h3>
            <p class="section-label">The Deep Dive Conversations</p>
        </div>
        <div class="episode-grid" id="podcast-grid"></div>
    </div>

    <!-- Footer -->
    <div class="page-footer">
        <a href="/zones/silence/index.html">← RETURN TO PIXELSTORTION</a>
    </div>

    <!-- Player Bar -->
    <div class="player-bar" id="podcast-player">
        <div class="player-bar-inner">
            <div class="progress-container" id="podcast-progress-container" onclick="seekPodcast(event)">
                <div class="progress-bar" id="podcast-progress-bar">
                    <div class="progress-knob"></div>
                </div>
            </div>
            <div class="controls-row">
                <button class="play-btn" id="podcast-play-btn" onclick="togglePodcastPlay()">
                    <span class="material-symbols-outlined">play_arrow</span>
                </button>
                <div class="track-info">
                    <p class="track-name" id="podcast-now-playing">No episode selected</p>
                    <p class="track-series">SILENCE IS THE TRAUMA</p>
                </div>
                <div class="time-display">
                    <span id="podcast-current-time">0:00</span>
                    <span class="time-divider">/</span>
                    <span id="podcast-duration">0:00</span>
                </div>
                <button class="close-btn" onclick="closePodcastPlayer()">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // PATH RESOLVER (same approach as silence/index.html)
        // ============================================================
        function resolveManifestPath(path) {
            // Paths in the manifest are relative to repo root (e.g. /library/...)
            // From /zones/podcast/ we go up two levels to reach root
            if (path && path.startsWith('/')) {
                return '../..' + path;
            }
            return path;
        }

        // ============================================================
        // CURSOR EFFECTS (matching silence zone)
        // ============================================================
        const cursorDot = document.getElementById('cursor-dot');
        const cursorGlow = document.getElementById('cursor-glow');

        if (window.matchMedia('(hover: hover)').matches) {
            document.addEventListener('mousemove', (e) => {
                cursorDot.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            });
        }

        // ============================================================
        // PODCAST SECTION
        // ============================================================
        let podcastAudio = null;
        let podcastDragging = false;
        let currentPodId = null;

        // Build podcasts array from manifest (with defensive fallback)
        const podcastData = (PIXEL_MANIFEST && PIXEL_MANIFEST.PODCASTS) ? PIXEL_MANIFEST.PODCASTS : {};
        const podcasts = Object.entries(podcastData).map(([key, pod]) => ({
            id: key,
            name: pod.name,
            cover: pod.cover,
            audio: pod.audio
        }));

        function renderPodcasts() {
            const container = document.getElementById('podcast-grid');
            if (!container) return;

            if (podcasts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <span class="material-symbols-outlined">podcasts</span>
                        <p>No episodes available yet.</p>
                    </div>`;
                return;
            }

            container.innerHTML = podcasts.map((pod, index) => `
                <div class="episode-card" id="card-${pod.id}"
                     onclick="openPodcastPlayer('${pod.id}')"
                     style="animation: fadeInUp 0.6s ease forwards ${index * 0.12}s; opacity: 0;">
                    <div class="episode-card-cover">
                        <img src="${resolveManifestPath(pod.cover)}" 
                             alt="${pod.name}"
                             loading="lazy">
                        <div class="episode-card-overlay"></div>
                        <div class="episode-card-gradient"></div>
                        <div class="episode-card-play">
                            <div class="play-circle">
                                <span class="material-symbols-outlined">play_arrow</span>
                            </div>
                        </div>
                    </div>
                    <div class="episode-card-info">
                        <h3 class="episode-card-name" title="${pod.name}">${pod.name}</h3>
                        <p class="episode-card-cta">LISTEN NOW</p>
                    </div>
                </div>
            `).join('');
        }

        function openPodcastPlayer(podId) {
            const pod = podcasts.find(p => p.id === podId);
            if (!pod) return;

            // Update URL hash for deep-linking
            history.replaceState(null, '', '#' + podId);

            // Stop existing podcast if playing
            if (podcastAudio) {
                podcastAudio.pause();
                podcastAudio.removeAttribute('src');
                podcastAudio.load();
            }

            // Remove active state from all cards
            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('now-playing'));

            // Set active card
            const card = document.getElementById('card-' + podId);
            if (card) card.classList.add('now-playing');
            currentPodId = podId;

            // Create new audio element
            podcastAudio = new Audio(resolveManifestPath(pod.audio));

            // Update UI
            document.getElementById('podcast-now-playing').textContent = pod.name;
            document.getElementById('podcast-current-time').textContent = '0:00';
            document.getElementById('podcast-duration').textContent = '0:00';
            document.getElementById('podcast-progress-bar').style.width = '0%';

            // Show player
            const player = document.getElementById('podcast-player');
            player.classList.add('visible');

            // Update play button
            const playBtn = document.getElementById('podcast-play-btn');
            playBtn.innerHTML = '<span class="material-symbols-outlined">pause</span>';

            // Time update handler
            podcastAudio.addEventListener('timeupdate', () => {
                if (podcastDragging) return;
                const current = podcastAudio.currentTime;
                const duration = podcastAudio.duration || 0;
                document.getElementById('podcast-current-time').textContent = formatPodcastTime(current);
                if (duration > 0) {
                    document.getElementById('podcast-progress-bar').style.width = (current / duration * 100) + '%';
                }
            });

            // Duration loaded handler
            podcastAudio.addEventListener('loadedmetadata', () => {
                document.getElementById('podcast-duration').textContent = formatPodcastTime(podcastAudio.duration);
            });

            // Ended handler
            podcastAudio.addEventListener('ended', () => {
                playBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>';
                document.getElementById('podcast-progress-bar').style.width = '100%';
            });

            // Start playing
            podcastAudio.play().catch(err => console.log('Podcast play failed:', err));

            // Setup drag-to-seek on progress bar
            setupPodcastDrag();
        }

        function togglePodcastPlay() {
            if (!podcastAudio) return;
            const playBtn = document.getElementById('podcast-play-btn');
            if (podcastAudio.paused) {
                podcastAudio.play();
                playBtn.innerHTML = '<span class="material-symbols-outlined">pause</span>';
            } else {
                podcastAudio.pause();
                playBtn.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>';
            }
        }

        function seekPodcast(event) {
            if (!podcastAudio || !podcastAudio.duration) return;
            const container = document.getElementById('podcast-progress-container');
            const rect = container.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const ratio = Math.max(0, Math.min(1, x / rect.width));
            podcastAudio.currentTime = ratio * podcastAudio.duration;
            document.getElementById('podcast-progress-bar').style.width = (ratio * 100) + '%';
        }

        function setupPodcastDrag() {
            const container = document.getElementById('podcast-progress-container');
            if (!container) return;

            // Remove old listeners by cloning
            const newContainer = container.cloneNode(true);
            container.parentNode.replaceChild(newContainer, container);
            newContainer.addEventListener('click', seekPodcast);

            newContainer.addEventListener('mousedown', (e) => {
                podcastDragging = true;
                seekPodcast(e);
            });

            document.addEventListener('mousemove', (e) => {
                if (!podcastDragging) return;
                const cont = document.getElementById('podcast-progress-container');
                const rect = cont.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const ratio = Math.max(0, Math.min(1, x / rect.width));
                document.getElementById('podcast-progress-bar').style.width = (ratio * 100) + '%';
                if (podcastAudio && podcastAudio.duration) {
                    podcastAudio.currentTime = ratio * podcastAudio.duration;
                }
            });

            document.addEventListener('mouseup', () => {
                podcastDragging = false;
            });

            // Touch support
            newContainer.addEventListener('touchstart', (e) => {
                podcastDragging = true;
                const touch = e.touches[0];
                seekPodcastAt(touch.clientX);
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                if (!podcastDragging) return;
                const touch = e.touches[0];
                seekPodcastAt(touch.clientX);
            }, { passive: true });

            document.addEventListener('touchend', () => {
                podcastDragging = false;
            });
        }

        function seekPodcastAt(clientX) {
            const container = document.getElementById('podcast-progress-container');
            if (!container || !podcastAudio || !podcastAudio.duration) return;
            const rect = container.getBoundingClientRect();
            const x = clientX - rect.left;
            const ratio = Math.max(0, Math.min(1, x / rect.width));
            podcastAudio.currentTime = ratio * podcastAudio.duration;
            document.getElementById('podcast-progress-bar').style.width = (ratio * 100) + '%';
        }

        function closePodcastPlayer() {
            if (podcastAudio) {
                podcastAudio.pause();
                podcastAudio.removeAttribute('src');
                podcastAudio.load();
                podcastAudio = null;
            }
            const player = document.getElementById('podcast-player');
            if (player) player.classList.remove('visible');

            // Remove active card state
            document.querySelectorAll('.episode-card').forEach(c => c.classList.remove('now-playing'));
            currentPodId = null;

            // Clear URL hash
            history.replaceState(null, '', window.location.pathname);
        }

        function formatPodcastTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + (s < 10 ? '0' : '') + s;
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            renderPodcasts();

            // Deep-link: auto-open episode from URL hash
            const hash = window.location.hash.slice(1);
            if (hash && podcasts.find(p => p.id === hash)) {
                // Small delay so the DOM is fully painted before triggering player
                setTimeout(() => openPodcastPlayer(hash), 300);
            }
        });
    </script>
</body>

</html>
